<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="title desc">
  <title id="title">Codox app logo</title>
  <desc id="desc">A glowing scanner beam sweeps a white document on a midnight-blue square; plain gray text above the beam becomes colorful structured cells below, which drop out as a finished row.</desc>
  <defs>
    <linearGradient id="g-night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2559"/>
      <stop offset="1" stop-color="#0a0f2e"/>
    </linearGradient>
    <linearGradient id="g-beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="f-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#g-night)"/>
  <rect x="156" y="76" width="200" height="264" rx="18" fill="#ffffff"/>
  <rect x="184" y="112" width="110" height="16" rx="8" fill="#c7cdf0"/>
  <rect x="184" y="144" width="144" height="16" rx="8" fill="#c7cdf0"/>
  <rect x="184" y="176" width="96" height="16" rx="8" fill="#c7cdf0"/>
  <rect x="184" y="264" width="42" height="18" rx="9" fill="#22d3ee"/>
  <rect x="236" y="264" width="42" height="18" rx="9" fill="#a78bfa"/>
  <rect x="288" y="264" width="42" height="18" rx="9" fill="#f472b6"/>
  <rect x="116" y="212" width="280" height="40" rx="20" fill="url(#g-beam)" filter="url(#f-glow)" opacity="0.7"/>
  <rect x="116" y="212" width="280" height="40" rx="20" fill="url(#g-beam)"/>
  <rect x="164" y="384" width="52" height="52" rx="13" fill="#22d3ee"/>
  <rect x="230" y="384" width="52" height="52" rx="13" fill="#a78bfa"/>
  <rect x="296" y="384" width="52" height="52" rx="13" fill="#f472b6"/>
  <path d="M 420 108 l 7 18 l 18 7 l -18 7 l -7 18 l -7 -18 l -18 -7 l 18 -7 z" fill="#22d3ee"/>
  <path d="M 96 340 l 6 15 l 15 6 l -15 6 l -6 15 l -6 -15 l -15 -6 l 15 -6 z" fill="#f472b6"/>
</svg>
