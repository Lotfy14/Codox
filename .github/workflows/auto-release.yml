name: Auto release

# Every push to main produces a full release vX: 0.0.1, 0.0.2, ... —
# the patch number is this workflow's run number, so it increments on
# each push without any state kept in the repo. Releases are never marked
# prerelease: /releases/latest feeds the Windows auto-updater.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: auto-release
  cancel-in-progress: false

env:
  VERSION: 0.0.${{ github.run_number }}

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install browser for end-to-end tests
        run: npx playwright install --with-deps chromium

      - name: Run lint
        run: npm run lint

      - name: Run unit and integration tests
        run: npm test

      - name: Run critical browser journeys
        run: npm run test:e2e

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  # The web app ships from HERE, not from Cloudflare's own git integration.
  # Building it in this workflow is what gives it the release version: VERSION
  # exists only in Actions, so a Cloudflare-side build fell back to
  # package.json's stale 0.4.0 and every web build mislabelled itself.
  web:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      # Picks up the workflow-level VERSION → __APP_VERSION__ (vite.config.ts).
      - name: Build web app
        run: npm run build

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Stamp build version
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            for (const file of ["package.json", "src-tauri/tauri.conf.json"]) {
              const json = JSON.parse(fs.readFileSync(file, "utf8"));
              json.version = process.env.VERSION;
              fs.writeFileSync(file, JSON.stringify(json, null, 2) + "\n");
            }
          '

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri NSIS installer
        uses: tauri-apps/tauri-action@v1.0.0
        env:
          # Signs the updater artifact so installed apps can verify and
          # auto-install new versions (tauri-plugin-updater).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
          if-no-files-found: error

  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install npm dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Stamp Android version
        run: |
          sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"$VERSION\"/" android/app/build.gradle

      # Android refuses to upgrade a package whose signing certificate changed,
      # so every release MUST be signed with the one keystore held in secrets.
      # A debug build would be signed with a keystore Gradle invents per runner,
      # which is what made every APK conflict with the installed one.
      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is not set — an APK signed with any other key cannot upgrade an installed Codox."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/codox-release.p12
          cat > android/keystore.properties <<EOF
          storeFile=codox-release.p12
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEYSTORE_PASSWORD
          EOF

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build signed release APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleRelease

      - name: Enable Android emulator acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android launch smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          script: cd android && ./gradlew :app:connectedDebugAndroidTest

      - name: Upload Android test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-diagnostics
          path: |
            android/app/build/reports/androidTests
            android/app/build/outputs/androidTest-results

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk "codox-$VERSION.apk"

      # The whole point of the keystore is that this fingerprint never changes:
      # the day it does, every installed Codox stops being upgradable. Fail the
      # release rather than ship an APK nobody can install over the old one.
      - name: Verify APK signing certificate
        env:
          EXPECTED: 01c6562aba5f587c3983ae2aaab8528c4689284131f7d71b71fa236d667b5765
        run: |
          APKSIGNER=$(ls "$ANDROID_HOME"/build-tools/*/apksigner | sort | tail -1)
          ACTUAL=$("$APKSIGNER" verify --print-certs "codox-$VERSION.apk" \
            | sed -n 's/.*SHA-256 digest: \([0-9a-f]*\).*/\1/p' | head -1)
          echo "certificate SHA-256: $ACTUAL"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::APK is signed with an unexpected certificate — it could not upgrade an installed Codox."
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: codox-*.apk
          if-no-files-found: error

  release:
    # Ship everywhere or nowhere: the release notes point at the web app as
    # "always latest", so do not cut a release whose web deploy failed.
    needs: [quality, web, windows, android]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: assets

      - name: Build updater manifest (latest.json)
        shell: bash
        run: |
          SIG=$(cat "assets/Codox_${VERSION}_x64-setup.exe.sig")
          cat > assets/latest.json <<EOF
          {
            "version": "${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIG}",
                "url": "https://github.com/Lotfy14/Codox/releases/download/v${VERSION}/Codox_${VERSION}_x64-setup.exe"
              }
            }
          }
          EOF
          cat assets/latest.json

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Codox ${{ env.VERSION }}
          # Must stay a full release: GitHub's /releases/latest — used by the
          # in-app updater endpoint and download links — ignores prereleases.
          prerelease: false
          generate_release_notes: true
          files: assets/*
          body: |
            Automated build from the latest push to main.

            - **Web app (always latest):** https://codox.eriksonlegend1.workers.dev
            - **Windows:** download the `*-setup.exe`. From this version on, the app updates itself on launch. The installer is unsigned, so SmartScreen will warn — choose "More info → Run anyway".
            - **Android:** download `codox-*.apk` and allow "install from unknown sources" once, or just use the web app. From this version on, the update banner installs new versions for you. **Coming from an APK built before v0.0.51 you must uninstall Codox first** — those builds were signed with a throwaway key, so Android refuses to upgrade over them ("package conflicts with an existing package"). Uninstalling clears that phone's saved key and history; export anything you still need.
