name: Auto release

# Every push to main produces a prerelease vX: 0.0.1, 0.0.2, ... —
# the patch number is this workflow's run number, so it increments on
# each push without any state kept in the repo.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: auto-release
  cancel-in-progress: false

env:
  VERSION: 0.0.${{ github.run_number }}

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Stamp build version
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            for (const file of ["package.json", "src-tauri/tauri.conf.json"]) {
              const json = JSON.parse(fs.readFileSync(file, "utf8"));
              json.version = process.env.VERSION;
              fs.writeFileSync(file, JSON.stringify(json, null, 2) + "\n");
            }
          '

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri NSIS installer
        uses: tauri-apps/tauri-action@v1.0.0

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install npm dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Stamp Android version
        run: |
          sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"$VERSION\"/" android/app/build.gradle

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk "codox-$VERSION.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: codox-*.apk
          if-no-files-found: error

  release:
    needs: [windows, android]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Codox ${{ env.VERSION }}
          prerelease: true
          generate_release_notes: true
          files: assets/*
          body: |
            Automated test build from the latest push to main.

            - **Windows:** download the `*-setup.exe`. The installer is unsigned, so SmartScreen will warn — choose "More info → Run anyway".
            - **Android:** download `codox-*.apk` and allow "install from unknown sources" once.
            - The repo is private: downloading requires being signed into GitHub on the device.
